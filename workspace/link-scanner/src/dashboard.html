<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Scanner Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --text: #e2e8f0;
      --muted: #7c8499;
      --broken: #ef4444;
      --takeover: #f97316;
      --unclear: #eab308;
      --resolved: #22c55e;
      --invalid: #6b7280;
      --accent: #6366f1;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header h1 span { color: var(--accent); }

    .header-actions { display: flex; gap: 10px; align-items: center; }

    .btn-refresh {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .btn-refresh:hover { background: var(--border); }

    .last-updated { color: var(--muted); font-size: 12px; }

    /* ── Stats bar ── */
    .stats {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat {
      background: var(--surface);
      flex: 1;
      padding: 14px 20px;
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .stat-value.broken    { color: var(--broken); }
    .stat-value.takeover  { color: var(--takeover); }
    .stat-value.unclear   { color: var(--unclear); }
    .stat-value.resolved  { color: var(--resolved); }

    /* ── Filters ── */
    .filters {
      padding: 14px 24px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .filter-label { color: var(--muted); font-size: 12px; margin-right: 4px; }

    .filter-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
      padding: 0 24px 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    thead th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:hover { background: var(--surface); }

    tbody tr.is-resolved { opacity: 0.5; }

    td {
      padding: 12px 12px;
      vertical-align: top;
    }

    .post-title {
      font-weight: 500;
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .post-title a { color: var(--text); text-decoration: none; }
    .post-title a:hover { color: var(--accent); }

    .link-url {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: var(--muted);
      max-width: 280px;
      word-break: break-all;
    }

    .link-url a { color: inherit; text-decoration: none; }
    .link-url a:hover { color: var(--text); }

    .reason-cell {
      font-size: 12px;
      color: var(--muted);
      max-width: 200px;
    }

    .date-cell {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge-broken     { background: rgba(239,68,68,0.15);  color: var(--broken); }
    .badge-takeover   { background: rgba(249,115,22,0.15); color: var(--takeover); }
    .badge-unclear    { background: rgba(234,179,8,0.15);  color: var(--unclear); }
    .badge-resolved   { background: rgba(34,197,94,0.15);  color: var(--resolved); }
    .badge-invalid    { background: rgba(107,114,128,0.15);color: var(--invalid); }
    .badge-open       { background: rgba(99,102,241,0.1);  color: var(--accent); }

    /* ── Action buttons ── */
    .actions { display: flex; gap: 6px; white-space: nowrap; }

    .action-btn {
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.15s;
    }

    .action-btn:hover { background: var(--border); }

    .action-btn.resolve:hover  { border-color: var(--resolved); color: var(--resolved); }
    .action-btn.invalidate:hover { border-color: var(--invalid); color: var(--invalid); }
    .action-btn.reopen:hover   { border-color: var(--accent);   color: var(--accent); }

    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Empty / loading states ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }

    /* ── HTTP status chip ── */
    .http-chip {
      display: inline-block;
      font-family: monospace;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <h1>🔗 Link <span>Scanner</span></h1>
  <div class="header-actions">
    <span class="last-updated" id="lastUpdated">Loading…</span>
    <button class="btn-refresh" onclick="load()">↻ Refresh</button>
  </div>
</header>

<div class="stats" id="stats">
  <div class="stat"><div class="stat-value broken" id="s-broken">–</div><div class="stat-label">Broken</div></div>
  <div class="stat"><div class="stat-value takeover" id="s-takeover">–</div><div class="stat-label">Takeover Risk</div></div>
  <div class="stat"><div class="stat-value unclear" id="s-unclear">–</div><div class="stat-label">Unclear</div></div>
  <div class="stat"><div class="stat-value resolved" id="s-resolved">–</div><div class="stat-label">Resolved</div></div>
  <div class="stat"><div class="stat-value" id="s-total">–</div><div class="stat-label">Total Flagged</div></div>
</div>

<div class="filters">
  <span class="filter-label">Status</span>
  <button class="filter-btn active" data-filter="all"       onclick="setFilter('all',this)">All</button>
  <button class="filter-btn"        data-filter="open"      onclick="setFilter('open',this)">Open</button>
  <button class="filter-btn"        data-filter="broken"    onclick="setFilter('broken',this)">Broken</button>
  <button class="filter-btn"        data-filter="takeover_risk" onclick="setFilter('takeover_risk',this)">Takeover Risk</button>
  <button class="filter-btn"        data-filter="unclear"   onclick="setFilter('unclear',this)">Unclear</button>
  <div class="filter-sep"></div>
  <button class="filter-btn"        data-filter="resolved"  onclick="setFilter('resolved',this)">Resolved</button>
  <button class="filter-btn"        data-filter="invalid"   onclick="setFilter('invalid',this)">Invalid</button>
</div>

<div class="table-wrap">
  <div class="loading" id="loading">Loading…</div>
  <table id="table" style="display:none">
    <thead>
      <tr>
        <th>Post</th>
        <th>Link</th>
        <th>Link Text</th>
        <th>Type</th>
        <th>HTTP</th>
        <th>Reason</th>
        <th>Checked</th>
        <th>Resolution</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty-state" id="empty" style="display:none">
    <h3>No results</h3>
    <p>No flagged links match the current filter.</p>
  </div>
</div>

<script>
  // Derive base path so fetches work whether accessed at /dashboard or /linkchecker/dashboard
  const base = window.location.pathname.replace(/\/dashboard$/, '');

  let allLinks = [];
  let currentFilter = 'all';

  async function load() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('table').style.display = 'none';
    document.getElementById('empty').style.display = 'none';

    try {
      const url = `${base}/flagged-links`;
      const res = await fetch(url);
      const text = await res.text();
      if (!res.ok || !text.startsWith('[')) {
        document.getElementById('loading').innerHTML =
          `<b>Fetch failed</b><br>URL: <code>${url}</code><br>Status: ${res.status}<br>` +
          `<pre style="text-align:left;margin-top:8px;font-size:11px;white-space:pre-wrap;word-break:break-all">${esc(text.slice(0, 500))}</pre>`;
        return;
      }
      allLinks = JSON.parse(text);
      updateStats();
      render();
      document.getElementById('lastUpdated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    } catch(e) {
      document.getElementById('loading').innerHTML =
        `<b>Error loading data</b><br><code>${esc(String(e))}</code><br>` +
        `<small>base path detected: <code>${base || '(empty)'}</code></small>`;
    }
  }

  function updateStats() {
    const broken   = allLinks.filter(l => l.link_status === 'broken'        && !l.resolution).length;
    const takeover = allLinks.filter(l => l.link_status === 'takeover_risk' && !l.resolution).length;
    const unclear  = allLinks.filter(l => l.link_status === 'unclear'       && !l.resolution).length;
    const resolved = allLinks.filter(l => l.resolution === 'resolved').length;

    document.getElementById('s-broken').textContent   = broken;
    document.getElementById('s-takeover').textContent = takeover;
    document.getElementById('s-unclear').textContent  = unclear;
    document.getElementById('s-resolved').textContent = resolved;
    document.getElementById('s-total').textContent    = allLinks.length;
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function filtered() {
    return allLinks.filter(l => {
      if (currentFilter === 'all')          return true;
      if (currentFilter === 'open')         return !l.resolution;
      if (currentFilter === 'resolved')     return l.resolution === 'resolved';
      if (currentFilter === 'invalid')      return l.resolution === 'invalid';
      return l.link_status === currentFilter && !l.resolution;
    });
  }

  function render() {
    const rows = filtered();
    document.getElementById('loading').style.display = 'none';

    if (rows.length === 0) {
      document.getElementById('table').style.display = 'none';
      document.getElementById('empty').style.display = 'block';
      return;
    }

    document.getElementById('empty').style.display = 'none';
    document.getElementById('table').style.display = 'table';

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = rows.map(l => `
      <tr id="row-${l.id}" class="${l.resolution ? 'is-resolved' : ''}">
        <td>
          <div class="post-title">
            <a href="${esc(l.post_url)}" target="_blank" title="${esc(l.post_title || '')}">
              ${esc(l.post_title || l.post_url)}
            </a>
          </div>
        </td>
        <td>
          <div class="link-url">
            <a href="${esc(l.link)}" target="_blank">${esc(l.link)}</a>
          </div>
        </td>
        <td><div class="reason-cell">${esc(l.link_text || '—')}</div></td>
        <td>${statusBadge(l.link_status)}</td>
        <td>${l.http_status ? `<span class="http-chip">${l.http_status}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
        <td><div class="reason-cell">${esc(l.reason || '—')}</div></td>
        <td><div class="date-cell">${formatDate(l.checked_at)}</div></td>
        <td>${resolutionBadge(l.resolution)}</td>
        <td>
          <div class="actions">
            ${!l.resolution ? `
              <button class="action-btn resolve"    onclick="resolve(${l.id},'resolved')">✓ Resolve</button>
              <button class="action-btn invalidate" onclick="resolve(${l.id},'invalid')">✕ Invalid</button>
            ` : `
              <button class="action-btn reopen" onclick="resolve(${l.id},null)">↩ Reopen</button>
            `}
          </div>
        </td>
      </tr>
    `).join('');
  }

  async function resolve(id, resolution) {
    const btns = document.querySelectorAll(`#row-${id} .action-btn`);
    btns.forEach(b => b.disabled = true);

    try {
      await fetch(`${base}/flagged-links/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ resolution }),
      });

      // Update local state
      const link = allLinks.find(l => l.id === id);
      if (link) link.resolution = resolution;
      updateStats();
      render();
    } catch(e) {
      btns.forEach(b => b.disabled = false);
      alert('Failed to update: ' + e.message);
    }
  }

  function statusBadge(s) {
    const map = {
      broken:        ['badge-broken',   '✗ Broken'],
      takeover_risk: ['badge-takeover', '⚠ Takeover Risk'],
      unclear:       ['badge-unclear',  '? Unclear'],
    };
    const [cls, label] = map[s] || ['', s];
    return `<span class="badge ${cls}">${label}</span>`;
  }

  function resolutionBadge(r) {
    if (!r) return `<span class="badge badge-open">Open</span>`;
    if (r === 'resolved') return `<span class="badge badge-resolved">✓ Resolved</span>`;
    if (r === 'invalid')  return `<span class="badge badge-invalid">✕ Invalid</span>`;
    return r;
  }

  function formatDate(d) {
    if (!d) return '—';
    return new Date(d.replace(' ', 'T') + 'Z').toLocaleString(undefined, {
      month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  load();
</script>
</body>
</html>
